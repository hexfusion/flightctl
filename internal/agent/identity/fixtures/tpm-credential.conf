# Automatically generated TPM credential configuration
# This file was created by flightctl-agent when TPM authentication was initialized

[Service]
# TPM Storage Hierarchy Password Configuration
# Sealed with host key only to ensure availability for TPM operations
Environment="TPM_STORAGE_PASSWORD_FILE=%d/{{.CredentialName}}"
LoadCredentialEncrypted={{.CredentialName}}:{{.SealedPath}}